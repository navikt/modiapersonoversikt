<!DOCTYPE html>
<html lang="no" data-hj-suppress>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="theme-color" content="#222222">
    <meta name="author" content="Nav">
    <meta property="og:title" content="Modia Personoversikt">
    <meta property="og:site_name" content="Nav Modia Personoversikt">
    <meta property="og:description"
          content="Intern arbeidsflate. Brukes som personoppslag og dialogverktøy av veiledere og saksbehandlere i Nav">
    <link rel="shortcut icon" href="./favicon.ico">
    
    <link rel="preload" href="https://cdn.nav.no/aksel/fonts/SourceSans3-normal.woff2" as="font" type="font/woff2" crossorigin/>
    <script>
        window.beforeSendAnalytics = (_event, payload) => {
            const url = new URL(window.location.href);
            if (url.host.includes('localhost')) return false;
            return payload
    };
    </script>

    <slot not-environment="prod">
        <script
                defer
                data-before-send="beforeSendAnalytics"
                src="https://cdn.nav.no/team-researchops/sporing/sporing-dev.js"
                data-website-id="bc5cfdcd-ecc1-402b-8cb0-c30913f0bd13"
                data-auto-track="false"
        ></script>
    </slot>
    <slot environment="prod">
        <script
                defer
                data-before-send="beforeSendAnalytics"
                src="https://cdn.nav.no/team-researchops/sporing/sporing.js"
                data-website-id="a8c2ec9c-2846-4154-8841-5db26494171a"
                data-auto-track="false"
        ></script>
    </slot>

    <style>
        @layer base, po-base, tailwind-base, nav-frontend, aksel.components, tailwind-components, tailwind-utilities, decorator;
    </style>

    <slot not-environment="prod">
        <script src="%VITE_HODE_URL_V2%/dev/latest/dist/internarbeidsflate-decorator.wc.js" type="module"></script>
    </slot>
    <slot environment="prod">
        <script src="%VITE_HODE_URL_V2%/prod/latest/dist/internarbeidsflate-decorator.wc.js" type="module"></script>
    </slot>

    <script env-vars prefix="PUBLIC_">
    </script>

    <script unleash
        toggles="modiapersonoversikt.enable-faro">
      const applicationFeatureToggles = {
          enableFaro: unleash && unleash["modiapersonoversikt_enable-faro"],
      };
      window.applicationFeatureToggles = applicationFeatureToggles;
    </script>

    <script type="application/javascript">
      const global = globalThis;
    </script>

    <script type="module" src="/src/main.tsx"></script>

    <title>Modia Personoversikt</title>
</head>
<body>
<noscript>
    You need to enable JavaScript to run this app.
</noscript>
<script>
    window.SKYRA_CONFIG = {
        org: 'arbeids-og-velferdsetaten-nav'
    }
</script>
<script src="https://survey.skyra.no/skyra-survey.js"></script>
<div id="root"></div>

</body>
</html>
